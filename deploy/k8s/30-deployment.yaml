# Deployment of the amr-geo-failover Spring Boot app.
#
# Key bits for AKS + AMR:
#  - serviceAccountName: amr-demo-sa  → bound to UAMI via Workload Identity.
#  - label `azure.workload.identity/use: "true"` on the POD (not just the SA)
#    tells the mutating webhook to inject AZURE_* env vars and the projected
#    token volume. The webhook will not act on a pod that lacks this label.
#  - 2 replicas so a single pod crash isn't observable in /status during the
#    Cilium scenario.
#  - Distroless runtime → tcpSocket readiness probe instead of httpGet would
#    also work; httpGet is fine because the JVM responds on /actuator/health
#    once Spring is up.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amr-geo-failover
  namespace: amr-demo
  labels:
    app: amr-geo-failover
    app.kubernetes.io/part-of: amr-geo-failover
spec:
  replicas: 2
  selector:
    matchLabels:
      app: amr-geo-failover
  template:
    metadata:
      labels:
        app: amr-geo-failover
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: amr-demo-sa
      containers:
        - name: app
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: amr-demo-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
