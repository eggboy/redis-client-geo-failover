# ServiceAccount federated to a User-Assigned Managed Identity that holds the
# AMR `default` data-access policy on both caches.
#
# The `azure.workload.identity/client-id` annotation is templated by
# scripts/aks-deploy.sh from the UAMI_CLIENT_ID output of aks-bootstrap.sh.
#
# Workload Identity reference:
# https://learn.microsoft.com/azure/aks/workload-identity-overview
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amr-demo-sa
  namespace: amr-demo
  annotations:
    azure.workload.identity/client-id: ${UAMI_CLIENT_ID}
  labels:
    azure.workload.identity/use: "true"
    app.kubernetes.io/part-of: amr-geo-failover
